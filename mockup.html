<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colocation Dictionary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f0e8;
    color: #2c2c2c;
    min-height: 100vh;
  }

  header {
    background: #1a3a2a;
    color: #f5f0e8;
    padding: 2rem 1rem 1.5rem;
    text-align: center;
  }

  header h1 {
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.7;
    font-style: italic;
  }

  .search-container {
    max-width: 600px;
    margin: -1.2rem auto 0;
    padding: 0 1rem;
    position: relative;
    z-index: 1;
  }

  .search-box {
    display: flex;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  .search-box input {
    flex: 1;
    border: none;
    padding: 1rem 1.2rem;
    font-size: 1.1rem;
    font-family: inherit;
    outline: none;
    background: transparent;
  }

  .search-box button {
    background: #1a3a2a;
    color: #f5f0e8;
    border: none;
    padding: 1rem 1.5rem;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }

  .search-box button:hover { background: #254d38; }

  .results {
    max-width: 700px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .result-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .headword {
    font-size: 2.2rem;
    font-weight: bold;
    color: #1a3a2a;
  }

  .pronunciation {
    font-size: 1rem;
    color: #777;
    font-style: italic;
  }

  .definition {
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 1.5rem;
    line-height: 1.5;
    border-left: 3px solid #d4c9b0;
    padding-left: 0.8rem;
  }

  .section {
    margin-bottom: 1.8rem;
  }

  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #1a3a2a;
    border-bottom: 2px solid #1a3a2a;
    padding-bottom: 0.3rem;
    margin-bottom: 0.5rem;
    font-weight: bold;
  }

  .group-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 0.2rem;
    margin-top: 0.8rem;
  }

  .collocations-wrap {
    display: flex;
    gap: 2rem;
  }

  .collocations {
    display: grid;
    grid-template-columns: auto auto;
    gap: 0.1rem 2rem;
    font-size: 0.95rem;
    line-height: 1.6;
    justify-content: start;
    flex: 1;
    min-width: 0;
  }

  .collocation .highlight {
    font-weight: bold;
  }

  .score {
    font-size: 0.8rem;
    color: #999;
    font-variant-numeric: tabular-nums;
  }

  .status {
    text-align: center;
    padding: 3rem 1rem;
    color: #999;
    font-style: italic;
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.8rem;
    color: #aaa;
  }
</style>
</head>
<body>

<header>
  <h1>Colocation Dictionary</h1>
  <p>find the words that live together</p>
</header>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="search" placeholder="Look up a word..." autofocus>
    <button onclick="search()">Search</button>
  </div>
</div>

<div class="results" id="results"></div>

<footer>
  Colocation Dictionary &middot; Mockup
</footer>

<script>
const DATA_DIR = 'output-data';

let wordList = null;
let shardCache = {};

function b36(s) { return parseInt(s, 36); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadWords() {
  if (wordList) return wordList;
  const res = await fetch(`${DATA_DIR}/words.txt`);
  wordList = (await res.text()).trim().split('\n');
  return wordList;
}

const POS_LABELS = { n: 'noun', v: 'verb', a: 'adj.' };

async function loadShard(prefix) {
  if (shardCache[prefix]) return shardCache[prefix];
  try {
    const res = await fetch(`${DATA_DIR}/${prefix}.dat`);
    if (!res.ok) return null;
    const text = await res.text();
    // entries keyed by wordId → array of { pos, definition, patterns }
    const entries = {};
    for (const line of text.trim().split('\n')) {
      const parts = line.split('\t');
      // header: wordId|pos|definition
      const [widStr, pos, definition] = parts[0].split('|');
      const wordId = b36(widStr);
      const patterns = {};
      for (let i = 1; i < parts.length; i++) {
        const colon = parts[i].indexOf(':');
        const type = parts[i].slice(0, colon);
        const rest = parts[i].slice(colon + 1);
        patterns[type] = rest.split(';').map(entry => {
          const [wid, score] = entry.split(',');
          return { wordId: b36(wid), score: parseInt(score) };
        });
      }
      if (!entries[wordId]) entries[wordId] = [];
      entries[wordId].push({ pos, definition, patterns });
    }
    shardCache[prefix] = entries;
    return entries;
  } catch {
    return null;
  }
}

function resolve(id) {
  return wordList[id] || `[${id}]`;
}

function renderColumn(entries, word, before) {
  let html = '<div class="collocations">';
  for (const { wordId, score } of entries) {
    const other = resolve(wordId);
    const scoreFmt = (score / 10).toFixed(1);
    if (before) {
      html += `<span class="collocation">${esc(other)} <span class="highlight">${esc(word)}</span></span>`;
    } else {
      html += `<span class="collocation"><span class="highlight">${esc(word)}</span> ${esc(other)}</span>`;
    }
    html += `<span class="score">${scoreFmt}</span>`;
  }
  html += '</div>';
  return html;
}

function renderGrid(entries, word, before) {
  const left = entries.filter((_, i) => i % 2 === 0);
  const right = entries.filter((_, i) => i % 2 === 1);
  let html = '<div class="collocations-wrap">';
  html += renderColumn(left, word, before);
  if (right.length) html += renderColumn(right, word, before);
  html += '</div>';
  return html;
}

function renderPosEntry(word, entry) {
  const { pos, definition, patterns } = entry;
  const w = esc(word);
  const posLabel = POS_LABELS[pos] || pos;

  let html = '';
  html += `<div class="result-header">`;
  html += `<span class="headword">${w}</span>`;
  html += `<span class="pronunciation">${esc(posLabel)}</span>`;
  html += `</div>`;
  html += `<div class="definition">${esc(definition)}</div>`;

  if (pos === 'n') {
    // Noun headword: a, v, V, n, N
    if (patterns.a) {
      html += `<div class="section">`;
      html += `<div class="section-title">Adjective + ${w}</div>`;
      html += renderGrid(patterns.a, word, true);
      html += `</div>`;
    }
    if (patterns.v) {
      html += `<div class="section">`;
      html += `<div class="section-title">Verb + ${w}</div>`;
      html += renderGrid(patterns.v, word, true);
      html += `</div>`;
    }
    if (patterns.V) {
      html += `<div class="section">`;
      html += `<div class="section-title">${w} + verb</div>`;
      html += renderGrid(patterns.V, word, false);
      html += `</div>`;
    }
    if (patterns.n || patterns.N) {
      html += `<div class="section">`;
      html += `<div class="section-title">Noun phrases</div>`;
      if (patterns.n) {
        html += `<div class="group-label">___ + ${w}</div>`;
        html += renderGrid(patterns.n, word, true);
      }
      if (patterns.N) {
        html += `<div class="group-label">${w} + ___</div>`;
        html += renderGrid(patterns.N, word, false);
      }
      html += `</div>`;
    }
  } else if (pos === 'v') {
    // Verb headword: o, s, d, D
    if (patterns.o) {
      html += `<div class="section">`;
      html += `<div class="section-title">${w} + object</div>`;
      html += renderGrid(patterns.o, word, false);
      html += `</div>`;
    }
    if (patterns.s) {
      html += `<div class="section">`;
      html += `<div class="section-title">Subject + ${w}</div>`;
      html += renderGrid(patterns.s, word, true);
      html += `</div>`;
    }
    if (patterns.d || patterns.D) {
      html += `<div class="section">`;
      html += `<div class="section-title">Adverbs</div>`;
      if (patterns.d) {
        html += `<div class="group-label">___ + ${w}</div>`;
        html += renderGrid(patterns.d, word, true);
      }
      if (patterns.D) {
        html += `<div class="group-label">${w} + ___</div>`;
        html += renderGrid(patterns.D, word, false);
      }
      html += `</div>`;
    }
  } else if (pos === 'a') {
    // Adjective headword: j, e
    if (patterns.j) {
      html += `<div class="section">`;
      html += `<div class="section-title">${w} + noun</div>`;
      html += renderGrid(patterns.j, word, false);
      html += `</div>`;
    }
    if (patterns.e) {
      html += `<div class="section">`;
      html += `<div class="section-title">Adverb + ${w}</div>`;
      html += renderGrid(patterns.e, word, true);
      html += `</div>`;
    }
  }

  return html;
}

function renderResults(word, posEntries) {
  const el = document.getElementById('results');
  let html = '';
  for (const entry of posEntries) {
    html += renderPosEntry(word, entry);
  }
  el.innerHTML = html;
}

async function search() {
  const input = document.getElementById('search');
  const word = input.value.trim().toLowerCase();
  const el = document.getElementById('results');

  if (!word) { el.innerHTML = ''; return; }

  el.innerHTML = '<div class="status">Loading...</div>';

  const words = await loadWords();
  const wordId = words.indexOf(word);

  if (wordId === -1) {
    el.innerHTML = `<div class="status">No entry for "${esc(word)}"</div>`;
    return;
  }

  const prefix = word.slice(0, 2);
  const shard = await loadShard(prefix);

  if (!shard || !shard[wordId]) {
    el.innerHTML = `<div class="status">No collocations found for "${esc(word)}"</div>`;
    return;
  }

  renderResults(word, shard[wordId]);
}

document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>

</body>
</html>
